name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  id-token: write
  contents: write

jobs:
  _kb-seed-failure:
    name: KB Seed Failure
    runs-on: ubuntu-latest
    steps:
      - name: Intentional failure for KB seeding
        run: |
          python -c "import nonexistent_mcp_auth_module"
  gitleaks:
    name: Secret Scan
    uses: aGora-Ops/agora-workflows/.github/workflows/gitleaks.yml@main
    with:
      service_name: agora-mcp-github

  sonar:
    name: SonarCloud Scan
    needs: gitleaks
    uses: aGora-Ops/agora-workflows/.github/workflows/sonar-scan.yml@main
    with:
      service_name: agora-mcp-github
      working-directory: .
      sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
    secrets: inherit

  build:
    name: Build & Scan
    needs: [gitleaks, sonar]
    uses: aGora-Ops/agora-workflows/.github/workflows/build-and-scan.yml@main
    with:
      service_name: agora-mcp-github
      dockerfile_path: Dockerfile
      aws_region: us-east-1
      run_trivy: true
    secrets: inherit

  push:
    name: Push to ECR
    needs: build
    # Trivy now runs on every event (used to be PR-only, never actually
    # gating what reaches ECR) -- explicit trivy_result check since
    # needs: build alone doesn't guarantee blocking on its internal failure.
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      github.event_name == 'push' &&
      needs.build.outputs.trivy_result != 'failure'
    uses: aGora-Ops/agora-workflows/.github/workflows/push-to-ecr.yml@main
    with:
      service_name: agora-mcp-github
      git_tag: ${{ needs.build.outputs.tag }}
      tag_exists: ${{ needs.build.outputs.tag_exists }}
      aws_region: us-east-1
    secrets: inherit

  helm-update:
    name: Update Helm Tag
    needs: push
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    uses: aGora-Ops/agora-workflows/.github/workflows/helm-update.yml@main
    with:
      service_name: agora-mcp-github
      image_tag: ${{ needs.push.outputs.tag }}
    secrets: inherit

  notify:
    name: Notify on Failure
    needs: [sonar, build, push, helm-update]
    if: always() && contains(needs.*.result, 'failure')
    uses: aGora-Ops/agora-workflows/.github/workflows/notify.yml@main
    with:
      service_name: agora-mcp-github
      build_result: ${{ needs.build.result }}
      push_result: ${{ needs.push.result }}
      trivy_result: ${{ needs.build.outputs.trivy_result }}
    secrets: inherit
